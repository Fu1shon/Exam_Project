<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая заявка - Банкетам.Нет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --color1: #05b1b1;
            --color2: #52339a;
        }

        header, footer {
            background: linear-gradient(var(--color1), var(--color2));
        }

        footer {
            padding: 50px 0;
        }

        .navbar {
            background-color: #2c2c2c;
            padding: 15px 0;
        }

        .navbar-brand {
            font-size: 1.8rem;
            font-weight: bold;
            color: white !important;
        }

        .btn-back {
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            text-decoration: none;
        }

        .btn-back:hover {
            background-color: black;
            color: aliceblue;
        }

        .btn-submit {
            background: linear-gradient(var(--color1), var(--color2));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }

        .btn-submit:hover {
            background-color: black;
            color: aliceblue;
            transform: scale(1.02);
        }

        .booking-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
        }

        .form-control-custom, .form-select-custom {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }

        .form-control-custom:focus, .form-select-custom:focus {
            outline: none;
            border-color: var(--color1);
            box-shadow: 0 0 5px rgba(5,177,177,0.3);
        }

        .btn-link {
            color: var(--color2);
            text-decoration: none;
        }

        .btn-link:hover {
            text-decoration: underline;
        }

        /* Кастомный стиль для календаря (нативный) */
        input[type="date"] {
            appearance: none;
            -webkit-appearance: none;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            background-color: var(--color1);
            border-radius: 5px;
            padding: 8px;
            cursor: pointer;
        }

        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            background-color: var(--color2);
        }
    </style>
</head>
<body>

<!-- НАВИГАЦИЯ -->
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/">🎉 Банкетам.Нет</a>
        <a href="/profile" class="btn-back">← Назад в профиль</a>
    </div>
</nav>

<!-- ФОРМА НОВОЙ ЗАЯВКИ -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="booking-card">
        <h2 class="text-center mb-4">📝 Новая заявка</h2>

        {{if .Error}}
        <div class="alert alert-danger text-center">{{.Error}}</div>
        {{end}}

        <form method="POST">
            <select name="room" class="form-select-custom" required>
                <option value="Банкетный зал Люкс">🏰 Банкетный зал Люкс</option>
                <option value="Ресторан Престиж">🍽️ Ресторан Престиж</option>
                <option value="Летняя веранда">🌿 Летняя веранда</option>
                <option value="Закрытая веранда">🏠 Закрытая веранда</option>
            </select>

            <!-- НАТИВНЫЙ КАЛЕНДАРЬ БЕЗ БИБЛИОТЕК -->
            <input type="date" id="date" name="date" class="form-control-custom"
                   min="{{.Today}}" required>

            <select name="payment" class="form-select-custom" required>
                <option value="Наличные">💰 Наличные</option>
                <option value="Карта">💳 Банковская карта</option>
                <option value="Безналичный">🏦 Безналичный расчет</option>
            </select>

            <button type="submit" class="btn-submit">Отправить заявку</button>
        </form>

        <div class="text-center mt-3">
            <a href="/profile" class="btn-link">← Вернуться в профиль</a>
        </div>
    </div>
</div>

<!-- ФУТЕР -->
<footer>
    <div class="container">
        <div class="row">
            <div class="text-center text-white">
                <p class="mb-0">© 2026 Банкетам.Нет. Все права защищены.</p>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Устанавливаем минимальную дату - сегодня
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    const todayFormatted = yyyy + '-' + mm + '-' + dd;
    document.getElementById('date').setAttribute('min', todayFormatted);
</script>
</body>
</html>
